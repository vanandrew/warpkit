package:
  name: warpkit
  version: 0.0.1

source:
  path: ../

build:
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed . -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.24
  host:
    - setuptools >=68.0.0
    - wheel >=0.40.0
    - cmake-build-extension >=0.5.1
    - python >=3.11
  run:
    - python >=3.11
    - nibabel >=4.0.2
    - numpy >=1.23.3
    - scikit-image >=0.20.0
    - scipy >=1.8.1
    - transforms3d >=0.4.1
    - indexed_gzip >=0.7.0

test:
  requires:
    - pytest
  imports:
    - warpkit
  commands:
    - pytest -s tests/
    - medic -h
