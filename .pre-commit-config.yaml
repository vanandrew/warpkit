default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
  - repo: local
    hooks:
      - id: gitmoji-commit-msg
        name: Commit subject must start with a gitmoji shortcode
        language: script
        stages: [commit-msg]
        entry: scripts/check-gitmoji.sh
